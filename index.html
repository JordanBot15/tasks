<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 Task Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    .card { backdrop-filter: blur(10px); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade { animation: fadeIn 0.3s ease-out; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 text-white min-h-screen">
  
  <div class="max-w-7xl mx-auto px-4 py-6">
    
    <!-- Header -->
    <header class="text-center mb-8">
      <h1 class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent inline-flex items-center gap-3">
        <span>🎯</span> Task Board
      </h1>
      <p class="text-slate-400 mt-2 text-sm">Track our projects in real-time</p>
    </header>

    <!-- Columns -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
      
      <!-- To Do -->
      <div class="bg-white/5 backdrop-blur-md rounded-2xl p-4 border border-white/10">
        <h2 class="text-sm font-semibold uppercase tracking-wider mb-4 flex items-center gap-2">
          <span class="w-2.5 h-2.5 rounded-full bg-yellow-400 shadow-lg shadow-yellow-400/50"></span>
          <span class="text-yellow-400">To Do</span>
          <span class="text-slate-500 text-xs ml-auto" id="todo-count">0</span>
        </h2>
        <div id="todo" class="space-y-3"></div>
      </div>
      
      <!-- In Progress -->
      <div class="bg-white/5 backdrop-blur-md rounded-2xl p-4 border border-white/10">
        <h2 class="text-sm font-semibold uppercase tracking-wider mb-4 flex items-center gap-2">
          <span class="w-2.5 h-2.5 rounded-full bg-blue-400 shadow-lg shadow-blue-400/50"></span>
          <span class="text-blue-400">In Progress</span>
          <span class="text-slate-500 text-xs ml-auto" id="inprogress-count">0</span>
        </h2>
        <div id="inprogress" class="space-y-3"></div>
      </div>
      
      <!-- Done -->
      <div class="bg-white/5 backdrop-blur-md rounded-2xl p-4 border border-white/10">
        <h2 class="text-sm font-semibold uppercase tracking-wider mb-4 flex items-center gap-2">
          <span class="w-2.5 h-2.5 rounded-full bg-emerald-400 shadow-lg shadow-emerald-400/50"></span>
          <span class="text-emerald-400">Done</span>
          <span class="text-slate-500 text-xs ml-auto" id="done-count">0</span>
        </h2>
        <div id="done" class="space-y-3"></div>
      </div>
      
    </div>
    
    <!-- Footer -->
    <footer class="text-center mt-8 text-slate-500 text-xs">
      Built with 🤖 <a href="https://jordanbot15.github.io/second-brain/" class="text-emerald-400 hover:underline">Second Brain</a>
    </footer>
  </div>

  <script>
    const tasks = [
      {id: 1, title: "Set up OpenClaw gateway", description: "Get OpenClaw running with Telegram", status: "done", assignee: "Jordan", created: "2026-02-19"},
      {id: 2, title: "Build Second Brain app", description: "Create knowledge base app with journal, concepts, projects", status: "done", assignee: "Jordan", created: "2026-02-19"},
      {id: 3, title: "Create JordanBot GitHub profile", description: "Profile README for JordanBot account", status: "done", assignee: "Jordan", created: "2026-02-19"},
      {id: 4, title: "Fix Telegram cron delivery", description: "Health checks not delivering to Telegram reliably", status: "in-progress", assignee: "Jordan", created: "2026-02-20"},
      {id: 5, title: "Build Task Board", description: "Create task tracker for projects", status: "done", assignee: "Jordan", created: "2026-02-21"},
      {id: 6, title: "Gateway crash monitoring", description: "Find root cause of 10-min crash, add alerts", status: "todo", assignee: "both", created: "2026-02-19"},
      {id: 7, title: "Write blog posts", description: "Document setup journey on github.io", status: "todo", assignee: "Himanshu", created: "2026-02-19"},
      {id: 8, title: "EC2 Cost Calculator", description: "Website to estimate OpenClaw running costs", status: "todo", assignee: "both", created: "2026-02-19"},
      {id: 9, title: "Minimalist Tasks App", description: "Build Excalidraw-style task app", status: "todo", assignee: "both", created: "2026-02-19"}
    ];
    
    function getAssigneeBadge(assignee) {
      if (assignee === 'Jordan') return '<span class="text-xs px-2 py-1 rounded-full bg-blue-500/20 text-blue-300 border border-blue-500/30">🤖 Jordan</span>';
      if (assignee === 'Himanshu') return '<span class="text-xs px-2 py-1 rounded-full bg-purple-500/20 text-purple-300 border border-purple-500/30">👤 Himanshu</span>';
      return '<span class="text-xs px-2 py-1 rounded-full bg-slate-500/20 text-slate-300 border border-slate-500/30">🤖 + 👤</span>';
    }
    
    function renderTasks(taskList, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = taskList.map((task, i) => `
        <div class="bg-white/5 rounded-xl p-4 border border-white/10 hover:bg-white/10 transition-all duration-200 animate-fade" style="animation-delay: ${i * 50}ms">
          <div class="font-semibold text-white">${task.title}</div>
          <div class="text-sm text-slate-400 mt-1">${task.description}</div>
          <div class="flex items-center gap-2 mt-3">
            ${getAssigneeBadge(task.assignee)}
            <span class="text-xs text-slate-500 ml-auto">${task.created}</span>
          </div>
        </div>
      `).join('');
    }
    
    function render() {
      const todo = tasks.filter(t => t.status === 'todo');
      const inprogress = tasks.filter(t => t.status === 'in-progress');
      const done = tasks.filter(t => t.status === 'done');
      
      document.getElementById('todo-count').textContent = todo.length;
      document.getElementById('inprogress-count').textContent = inprogress.length;
      document.getElementById('done-count').textContent = done.length;
      
      renderTasks(todo, 'todo');
      renderTasks(inprogress, 'inprogress');
      renderTasks(done, 'done');
    }
    
    render();
  </script>
</body>
</html>
